<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CPL Flight Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        body { font-family: 'Inter', sans-serif; }
        
        input[type="number"]::-webkit-inner-spin-button,
        input[type="number"]::-webkit-outer-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }

        .chart-container {
            position: relative;
            width: 100%;
            height: 250px;
        }

        .bar-transition {
            transition: height 0.5s ease-out, fill 0.3s ease;
        }
        
        .custom-range {
            accent-color: #2563eb;
        }
    </style>
</head>
<body class="bg-[#f8fafc] text-slate-900 pb-12">

    <!-- Header & Progress -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-30">
        <div class="max-w-7xl mx-auto px-4 md:px-8 py-4 flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <div class="bg-blue-600 p-2 rounded-lg text-white">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.8 19.2 16 11l3.5-3.5C21 6 21.5 4 21 3c-1-.5-3 0-4.5 1.5L13 8 4.8 6.2c-.5-.1-.9.1-1.1.5l-.3.5c-.2.5-.1 1 .3 1.3L9 12l-2 3H4l-1 1 3 2 2 3 1-1v-3l3-2 3.5 5.3c.3.4.8.5 1.3.3l.5-.2c.4-.3.6-.7.5-1.2z"/></svg>
                </div>
                <h1 class="text-xl font-bold tracking-tight">CPL Flight Planner</h1>
            </div>
            
            <div class="flex-1 max-w-xs hidden md:block">
                <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">
                    <span id="progress-label">Progress to 200hrs</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="h-2 bg-slate-100 rounded-full overflow-hidden">
                    <div id="progress-bar" class="h-full bg-blue-500 transition-all duration-1000 ease-out" style="width: 0%"></div>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto p-4 md:p-8 grid grid-cols-1 lg:grid-cols-12 gap-8 mt-4">
        
        <!-- Sidebar: Configuration -->
        <aside class="lg:col-span-4 space-y-6">
            <section class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60">
                <div class="flex items-center gap-2 mb-6 text-blue-600">
                    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>
                    <h2 class="font-bold text-lg">Plan Configuration</h2>
                </div>
                
                <div class="space-y-5">
                    <!-- Date Pickers -->
                    <div class="space-y-2">
                        <label class="text-sm font-semibold text-slate-700">Target Completion Date</label>
                        <div class="grid grid-cols-2 gap-2">
                            <select id="targetMonth" class="bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all"></select>
                            <select id="targetYear" class="bg-slate-50 border border-slate-200 rounded-xl p-2.5 text-sm outline-none focus:ring-2 focus:ring-blue-500 transition-all"></select>
                        </div>
                    </div>

                    <!-- Hour Inputs -->
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-700">Goal Hours</label>
                            <div class="relative">
                                <input type="number" id="targetHours" value="200" class="w-full p-2.5 pr-10 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                                <span class="absolute right-3 top-2.5 text-slate-400 text-xs">hrs</span>
                            </div>
                        </div>
                        <div class="space-y-1">
                            <label class="text-sm font-semibold text-slate-700">Logged</label>
                            <div class="relative">
                                <input type="number" id="currentHours" value="45" class="w-full p-2.5 pr-10 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                                <span class="absolute right-3 top-2.5 text-slate-400 text-xs">hrs</span>
                            </div>
                        </div>
                    </div>

                    <!-- Cost Inputs -->
                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-slate-700">Rate per Hour (KES)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-slate-400 text-sm">KSh</span>
                            <input type="number" id="costPerHour" value="22000" class="w-full pl-12 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>

                    <div class="space-y-1">
                        <label class="text-sm font-semibold text-slate-700">Ground & Exams (KES)</label>
                        <div class="relative">
                            <span class="absolute left-3 top-2.5 text-slate-400 text-sm">KSh</span>
                            <input type="number" id="fixedCosts" value="150000" class="w-full pl-12 p-2.5 bg-slate-50 border border-slate-200 rounded-xl outline-none focus:ring-2 focus:ring-blue-500 transition-all">
                        </div>
                    </div>

                    <!-- Buffer Slider -->
                    <div class="pt-2">
                        <div class="flex justify-between mb-2">
                            <label class="text-sm font-semibold text-slate-700">Contingency Buffer</label>
                            <span id="bufferValue" class="text-sm font-bold text-blue-600">10%</span>
                        </div>
                        <input type="range" id="bufferPercent" min="0" max="30" step="5" value="10" class="w-full h-2 bg-slate-100 rounded-lg appearance-none cursor-pointer custom-range">
                    </div>
                </div>
            </section>

            <!-- Total Budget Summary -->
            <section class="bg-slate-900 text-white p-6 rounded-3xl shadow-xl relative overflow-hidden">
                <p class="text-slate-400 text-sm font-medium mb-1 uppercase tracking-tighter">Total Estimated Investment</p>
                <h3 id="displayTotalCost" class="text-3xl font-bold mb-4">KSh 0</h3>
                <div class="space-y-3">
                    <div class="flex justify-between text-sm py-2 border-t border-white/10">
                        <span class="text-slate-400">Timeframe</span>
                        <span id="displayTimeframe" class="font-bold">0 Months</span>
                    </div>
                    <div class="flex justify-between text-sm py-2 border-t border-white/10">
                        <span class="text-slate-400">Flying Remaining</span>
                        <span id="displayHoursLeft" class="font-bold">0 hrs</span>
                    </div>
                </div>
            </section>
        </aside>

        <!-- Main Dashboard -->
        <div class="lg:col-span-8 space-y-6">
            
            <!-- Action Plan Cards -->
            <div class="bg-white p-8 rounded-3xl shadow-sm border border-slate-200/60">
                <div class="flex flex-col md:flex-row md:items-center justify-between gap-6">
                    <div class="space-y-1">
                        <h2 class="text-2xl font-bold text-slate-900">Your Action Plan</h2>
                        <p id="action-subtitle" class="text-slate-500 italic">Targeting reach by Month Year</p>
                    </div>
                    
                    <div class="inline-flex bg-slate-100 p-1.5 rounded-2xl">
                        <button onclick="updateView('monthly')" id="btn-monthly" class="px-6 py-2 rounded-xl text-sm font-bold transition-all bg-white text-blue-600 shadow-sm">Monthly</button>
                        <button onclick="updateView('weekly')" id="btn-weekly" class="px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500">Weekly</button>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mt-10">
                    <div class="p-6 rounded-2xl bg-blue-50/50 border border-blue-100 flex flex-col items-center text-center">
                        <div class="w-12 h-12 bg-blue-600 text-white rounded-full flex items-center justify-center mb-4 shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 7V4a1 1 0 0 0-1-1H5a2 2 0 0 0 0 4h15a1 1 0 0 1 1 1v4h-3a2 2 0 0 0 0 4h3a1 1 0 0 0 1-1v-2a1 1 0 0 0-1-1"/><path d="M3 5v14a2 2 0 0 0 2 2h15a1 1 0 0 0 1-1v-4"/></svg>
                        </div>
                        <span id="save-label" class="text-xs font-bold text-blue-600/60 uppercase tracking-widest mb-1">Savings / Monthly</span>
                        <span id="targetSavings" class="text-3xl font-black text-slate-900">KSh 0</span>
                    </div>

                    <div class="p-6 rounded-2xl bg-emerald-50/50 border border-emerald-100 flex flex-col items-center text-center">
                        <div class="w-12 h-12 bg-emerald-500 text-white rounded-full flex items-center justify-center mb-4 shadow-lg">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                        </div>
                        <span id="fly-label" class="text-xs font-bold text-emerald-600/60 uppercase tracking-widest mb-1">Fly / Monthly</span>
                        <span id="targetHoursToFly" class="text-3xl font-black text-slate-900">0 hrs</span>
                    </div>
                </div>
            </div>

            <!-- Charts -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <!-- Cost Chart -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2 mb-8">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-emerald-500"><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"/><polyline points="17 6 23 6 23 12"/></svg>
                        Budget Progression
                    </h3>
                    <div class="chart-container">
                        <svg id="costChart" viewBox="0 0 400 200" width="100%" height="100%" preserveAspectRatio="none">
                            <path id="costArea" fill="rgba(16, 185, 129, 0.1)"></path>
                            <path id="costLine" fill="none" stroke="#10b981" stroke-width="3"></path>
                        </svg>
                    </div>
                </div>

                <!-- Hours Chart -->
                <div class="bg-white p-6 rounded-3xl shadow-sm border border-slate-200/60">
                    <h3 class="font-bold text-slate-800 flex items-center gap-2 mb-8">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-500"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
                        Hours Accumulation
                    </h3>
                    <div class="chart-container">
                        <svg id="hoursChart" viewBox="0 0 400 200" width="100%" height="100%" preserveAspectRatio="none">
                            <g id="barsGroup"></g>
                        </svg>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // --- CONSTANTS & SETUP ---
        const monthsNames = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
        let currentTimeView = 'monthly';

        // --- DOM ELEMENTS ---
        const els = {
            targetMonth: document.getElementById('targetMonth'),
            targetYear: document.getElementById('targetYear'),
            targetHours: document.getElementById('targetHours'),
            currentHours: document.getElementById('currentHours'),
            costPerHour: document.getElementById('costPerHour'),
            fixedCosts: document.getElementById('fixedCosts'),
            bufferPercent: document.getElementById('bufferPercent'),
            bufferValue: document.getElementById('bufferValue'),
            displayTotalCost: document.getElementById('displayTotalCost'),
            displayTimeframe: document.getElementById('displayTimeframe'),
            displayHoursLeft: document.getElementById('displayHoursLeft'),
            targetSavings: document.getElementById('targetSavings'),
            targetHoursToFly: document.getElementById('targetHoursToFly'),
            actionSubtitle: document.getElementById('action-subtitle'),
            progressBar: document.getElementById('progress-bar'),
            progressLabel: document.getElementById('progress-label'),
            progressPercent: document.getElementById('progress-percent'),
            saveLabel: document.getElementById('save-label'),
            flyLabel: document.getElementById('fly-label'),
            btnMonthly: document.getElementById('btn-monthly'),
            btnWeekly: document.getElementById('btn-weekly'),
            costArea: document.getElementById('costArea'),
            costLine: document.getElementById('costLine'),
            barsGroup: document.getElementById('barsGroup')
        };

        // Initialize Dropdowns
        const today = new Date();
        monthsNames.forEach((m, i) => {
            const opt = new Option(m, i);
            els.targetMonth.add(opt);
        });
        els.targetMonth.value = today.getMonth();

        const currentYear = today.getFullYear();
        for(let i=0; i<6; i++) {
            const opt = new Option(currentYear + i, currentYear + i);
            els.targetYear.add(opt);
        }
        els.targetYear.value = currentYear + 1;

        // --- CORE LOGIC ---

        function formatKES(val) {
            return new Intl.NumberFormat('en-KE', { style: 'currency', currency: 'KES', maximumFractionDigits: 0 }).format(val);
        }

        function updateView(view) {
            currentTimeView = view;
            els.btnMonthly.className = view === 'monthly' ? 'px-6 py-2 rounded-xl text-sm font-bold transition-all bg-white text-blue-600 shadow-sm' : 'px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500';
            els.btnWeekly.className = view === 'weekly' ? 'px-6 py-2 rounded-xl text-sm font-bold transition-all bg-white text-blue-600 shadow-sm' : 'px-6 py-2 rounded-xl text-sm font-bold transition-all text-slate-500';
            calculate();
        }

        function calculate() {
            // 1. Gather Data
            const targetH = parseFloat(els.targetHours.value) || 0;
            const currentH = parseFloat(els.currentHours.value) || 0;
            const rate = parseFloat(els.costPerHour.value) || 0;
            const fixed = parseFloat(els.fixedCosts.value) || 0;
            const buffer = parseFloat(els.bufferPercent.value) || 0;
            const tYear = parseInt(els.targetYear.value);
            const tMonth = parseInt(els.targetMonth.value);

            // 2. Time Logic
            const start = new Date(today.getFullYear(), today.getMonth(), 1);
            const end = new Date(tYear, tMonth, 1);
            let monthsLeft = (end.getFullYear() - start.getFullYear()) * 12 + (end.getMonth() - start.getMonth());
            if (monthsLeft < 1) monthsLeft = 1;
            const weeksLeft = monthsLeft * 4.345;

            // 3. Goals Logic
            const hLeft = Math.max(0, targetH - currentH);
            const hWithBuffer = hLeft * (1 + buffer / 100);
            const totalProjectCost = (hWithBuffer * rate) + fixed;

            // 4. Update UI Display
            els.displayTotalCost.innerText = formatKES(totalProjectCost);
            els.displayTimeframe.innerText = `${monthsLeft} Months`;
            els.displayHoursLeft.innerText = `${Math.round(hWithBuffer)} hrs`;
            els.bufferValue.innerText = `${buffer}%`;
            els.actionSubtitle.innerText = `Targeting reach by ${monthsNames[tMonth]} ${tYear}`;

            // 5. Update Action Plan
            if (currentTimeView === 'monthly') {
                els.targetSavings.innerText = formatKES(totalProjectCost / monthsLeft);
                els.targetHoursToFly.innerText = `${(hWithBuffer / monthsLeft).toFixed(1)} hrs`;
                els.saveLabel.innerText = 'Savings / Monthly';
                els.flyLabel.innerText = 'Fly / Monthly';
            } else {
                els.targetSavings.innerText = formatKES(totalProjectCost / weeksLeft);
                els.targetHoursToFly.innerText = `${(hWithBuffer / weeksLeft).toFixed(1)} hrs`;
                els.saveLabel.innerText = 'Savings / Weekly';
                els.flyLabel.innerText = 'Fly / Weekly';
            }

            // 6. Global Progress
            const prog = Math.min(100, (currentH / targetH) * 100);
            els.progressLabel.innerText = `Progress to ${targetH}hrs`;
            els.progressPercent.innerText = `${Math.round(prog)}%`;
            els.progressBar.style.width = `${prog}%`;

            // 7. Render Custom Charts
            renderCharts(monthsLeft, currentH, hWithBuffer, totalProjectCost, targetH);
        }

        function renderCharts(months, startH, totalH, totalCost, targetGoal) {
            // Cost Line Chart
            let linePoints = [];
            for (let i = 0; i <= months; i++) {
                const x = (i / months) * 400;
                const y = 200 - ((i / months) * 180); // Scaled
                linePoints.push(`${x},${y}`);
            }
            els.costLine.setAttribute('d', `M ${linePoints.join(' L ')}`);
            els.costArea.setAttribute('d', `M 0,200 L ${linePoints.join(' L ')} L 400,200 Z`);

            // Hours Bar Chart
            els.barsGroup.innerHTML = '';
            const barCount = Math.min(months, 12); // Max 12 bars for visual clarity
            const barWidth = 350 / barCount;
            
            for (let i = 0; i < barCount; i++) {
                const progress = (i + 1) / barCount;
                const currentVal = startH + (totalH * progress);
                const height = (currentVal / (targetGoal * 1.2)) * 180;
                const x = 25 + (i * barWidth);
                const isComplete = currentVal >= targetGoal;

                const rect = document.createElementNS("http://www.w3.org/2000/svg", "rect");
                rect.setAttribute('x', x);
                rect.setAttribute('y', 200 - height);
                rect.setAttribute('width', barWidth * 0.7);
                rect.setAttribute('height', height);
                rect.setAttribute('rx', 4);
                rect.setAttribute('fill', isComplete ? '#10b981' : '#3b82f6');
                rect.classList.add('bar-transition');
                els.barsGroup.appendChild(rect);
            }
        }

        // --- INPUT HANDLING ---

        function setupInputListeners() {
            const inputs = ['targetHours', 'currentHours', 'costPerHour', 'fixedCosts', 'bufferPercent'];
            inputs.forEach(id => {
                document.getElementById(id).addEventListener('input', (e) => {
                    // Remove leading zeros automatically
                    if(e.target.type === 'number') {
                        let val = e.target.value;
                        if (val.length > 1 && val.startsWith('0')) {
                            e.target.value = val.replace(/^0+/, '');
                        }
                    }
                    calculate();
                });
            });
            els.targetMonth.addEventListener('change', calculate);
            els.targetYear.addEventListener('change', calculate);
        }

        // Initial Run
        setupInputListeners();
        calculate();

    </script>
</body>
</html>
